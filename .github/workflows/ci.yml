name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------------------------
  # 1. Formatting — fast, runs first to surface trivial issues.
  # -------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # -------------------------------------------------------------------
  # 2. Clippy — pedantic + nursery + cargo lint groups.
  # -------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -------------------------------------------------------------------
  # 2.5. Script tests — installer and release helper hardening.
  # -------------------------------------------------------------------
  script_tests:
    name: script tests
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python3 -m unittest discover -s tests/scripts -p 'test_*.py'

  # -------------------------------------------------------------------
  # 3. Tests — Linux x86_64, Linux ARM64, macOS ARM64.
  # -------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest          # x86_64 Linux
          - ubuntu-24.04-arm       # ARM64 Linux
          - macos-14               # Apple Silicon
          - windows-latest         # x86_64 Windows
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ensure rustup cargo is first on PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: rustup default stable && cargo --version
      - run: cargo build --workspace --all-targets
      - run: cargo test  --workspace --all-features -- --nocapture

  # -------------------------------------------------------------------
  # 4. Driver certification — stock PostgreSQL client libraries.
  # -------------------------------------------------------------------
  driver_certification:
    name: driver certification
    runs-on: ubuntu-latest
    needs: fmt
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v6
        with:
          version: "11.1.2"
          run_install: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: tests/driver_certification/go/go.sum
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: install libpq development files
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql-client
      - name: install driver dependencies
        run: |
          python -m venv .venv-driver-cert
          .venv-driver-cert/bin/python -m pip install --disable-pip-version-check \
            -r tests/driver_certification/requirements.txt
          # Python harness pins psycopg2, psycopg3, SQLAlchemy, Django, and Alembic==1.18.4.
          bundle install --gemfile tests/driver_certification/rails/Gemfile --jobs 4 --retry 3
          pnpm --dir tests/driver_certification/node install --frozen-lockfile
          go -C tests/driver_certification/go mod download
          cargo fetch --manifest-path tests/driver_certification/diesel/Cargo.toml
          dotnet restore --locked-mode tests/driver_certification/dotnet/Ultrasql.DriverCertification.csproj
      - run: cargo build -p ultrasql-server --bin ultrasqld
      - name: run driver certification
        run: |
          .venv-driver-cert/bin/python tests/driver_certification/driver_certification.py \
            --ultrasqld target/debug/ultrasqld \
            --json-output target/driver-certification.json
      - uses: actions/upload-artifact@v7
        with:
          name: driver-certification
          path: target/driver-certification.json

  # -------------------------------------------------------------------
  # 5. Documentation — broken intra-doc links fail the build.
  # -------------------------------------------------------------------
  doc:
    name: docs
    runs-on: ubuntu-latest
    needs: fmt
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps

  # -------------------------------------------------------------------
  # 6. cargo-deny — license, advisory, banned-deps checks.
  # -------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # -------------------------------------------------------------------
  # 7. cargo-audit — direct RustSec advisory check.
  # -------------------------------------------------------------------
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit --deny yanked

  # -------------------------------------------------------------------
  # 8. Aggregate status — required check for branch protection.
  #    Job result values are passed via `env:` so the run script does
  #    not interpolate workflow-context values directly into shell.
  # -------------------------------------------------------------------
  ci-passed:
    name: ci-passed
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, clippy, script_tests, test, driver_certification, doc, deny, audit]
    steps:
      - name: check all required jobs succeeded
        env:
          FMT_RESULT:         ${{ needs.fmt.result }}
          CLIPPY_RESULT:      ${{ needs.clippy.result }}
          SCRIPT_TESTS_RESULT: ${{ needs.script_tests.result }}
          TEST_RESULT:        ${{ needs.test.result }}
          DRIVER_CERT_RESULT: ${{ needs.driver_certification.result }}
          DOC_RESULT:         ${{ needs.doc.result }}
          DENY_RESULT:        ${{ needs.deny.result }}
          AUDIT_RESULT:       ${{ needs.audit.result }}
        run: |
          if [ "$FMT_RESULT"    != "success" ] \
          || [ "$CLIPPY_RESULT" != "success" ] \
          || [ "$SCRIPT_TESTS_RESULT" != "success" ] \
          || [ "$TEST_RESULT"   != "success" ] \
          || [ "$DRIVER_CERT_RESULT" != "success" ] \
          || [ "$DOC_RESULT"    != "success" ] \
          || [ "$DENY_RESULT"   != "success" ] \
          || [ "$AUDIT_RESULT"  != "success" ]; then
            echo "::error::one or more required CI jobs did not succeed"
            exit 1
          fi
