name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # -------------------------------------------------------------------
  # 1. Formatting — fast, runs first to surface trivial issues.
  # -------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # -------------------------------------------------------------------
  # 2. Clippy — pedantic + nursery + cargo lint groups.
  # -------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -------------------------------------------------------------------
  # 3. Tests — Linux x86_64, Linux ARM64, macOS ARM64.
  # -------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest          # x86_64 Linux
          - ubuntu-24.04-arm       # ARM64 Linux
          - macos-14               # Apple Silicon
          - windows-latest         # x86_64 Windows
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: ensure rustup cargo is first on PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - run: rustup default stable && cargo --version
      - run: cargo build --workspace --all-targets
      - run: cargo test  --workspace --all-features -- --nocapture

  # -------------------------------------------------------------------
  # 4. Documentation — broken intra-doc links fail the build.
  # -------------------------------------------------------------------
  doc:
    name: docs
    runs-on: ubuntu-latest
    needs: fmt
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --all-features --no-deps

  # -------------------------------------------------------------------
  # 5. cargo-deny — license, advisory, banned-deps checks.
  # -------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # -------------------------------------------------------------------
  # 6. cargo-audit — direct RustSec advisory check.
  # -------------------------------------------------------------------
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit --deny yanked

  # -------------------------------------------------------------------
  # 7. Aggregate status — required check for branch protection.
  #    Job result values are passed via `env:` so the run script does
  #    not interpolate workflow-context values directly into shell.
  # -------------------------------------------------------------------
  ci-passed:
    name: ci-passed
    if: always()
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, doc, deny, audit]
    steps:
      - name: check all required jobs succeeded
        env:
          FMT_RESULT:    ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          TEST_RESULT:   ${{ needs.test.result }}
          DOC_RESULT:    ${{ needs.doc.result }}
          DENY_RESULT:   ${{ needs.deny.result }}
          AUDIT_RESULT:  ${{ needs.audit.result }}
        run: |
          if [ "$FMT_RESULT"    != "success" ] \
          || [ "$CLIPPY_RESULT" != "success" ] \
          || [ "$TEST_RESULT"   != "success" ] \
          || [ "$DOC_RESULT"    != "success" ] \
          || [ "$DENY_RESULT"   != "success" ] \
          || [ "$AUDIT_RESULT"  != "success" ]; then
            echo "::error::one or more required CI jobs did not succeed"
            exit 1
          fi
