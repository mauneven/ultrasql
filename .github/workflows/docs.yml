name: docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build docs site
    runs-on: ubuntu-latest
    outputs:
      pages_configured: ${{ steps.configure_pages.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: install docs dependencies
        run: python -m pip install --disable-pip-version-check -r docs/requirements.txt
      - name: validate documentation status audit
        run: python3 scripts/validate-documentation-status.py --out target/documentation_status_audit_status.json
      - name: build docs
        run: mkdocs build --strict
      - id: configure_pages
        uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
        continue-on-error: true
        with:
          enablement: true
      - name: note pages deployment unavailable
        if: github.event_name != 'pull_request' && steps.configure_pages.outcome != 'success'
        run: |
          echo "::warning::GitHub Pages is not enabled or this token cannot configure it; docs artifact was built and deployment is skipped."
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          path: site

  deploy:
    name: deploy docs site
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && needs.build.outputs.pages_configured == 'true'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
