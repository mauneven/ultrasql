name: supremacy

# Heavy-weight benchmark gate. Runs the full cross_compare_sql matrix
# against every competitor that is installable on a hosted Linux
# runner (PostgreSQL 17, SQLite 3, DuckDB) and fails iff UltraSQL is
# not the fastest engine on every workload.
#
# Intentionally NOT triggered on every push — competitors take time
# to install and the bench produces statistically meaningful numbers
# only on quiet hardware. Triggered:
#
#   - manually via `workflow_dispatch`
#   - weekly on Sunday at 02:00 UTC
#
# The check_supremacy.py script reads benchmarks/results/latest/raw
# and fails non-zero if any workload's winner is not "ultrasql".

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 0"

concurrency:
  group: supremacy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  supremacy:
    name: supremacy (linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # -- Install competitor engines ------------------------------------
      - name: install postgres + sqlite3
        run: |
          set -euo pipefail
          sudo apt-get update
          # Try postgresql-17 first; fall back to whatever the runner image
          # ships if -17 is not in the default apt sources.
          if ! sudo apt-get install -y --no-install-recommends \
              postgresql-17 postgresql-client-17 sqlite3; then
              sudo apt-get install -y --no-install-recommends \
                  postgresql postgresql-client sqlite3
          fi

      - name: install duckdb cli
        run: |
          set -euo pipefail
          DUCKDB_VERSION="1.1.3"
          curl -fsSL -o /tmp/duckdb.zip \
            "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip"
          sudo unzip -o /tmp/duckdb.zip -d /usr/local/bin
          duckdb --version

      - name: start postgres + bootstrap local role
        run: |
          set -euo pipefail
          sudo systemctl start postgresql || sudo service postgresql start
          pg_isready -t 30
          # The bench harness connects as the local UNIX user; on hosted
          # runners that is `runner`. Create a matching superuser + db.
          sudo -u postgres createuser -s runner || true
          sudo -u postgres createdb runner || true
          psql -h localhost -d postgres -c 'select version();'

      # -- Build ultrasql + bench harness --------------------------------
      - name: cargo build --release (workspace)
        run: cargo build --release --workspace --all-targets

      # -- Run cross_compare_sql -----------------------------------------
      - name: run cross_compare_sql (tier=low)
        run: |
          set -euo pipefail
          # Hosted runners are noisy (4 cores, 16 GB RAM) so we run the
          # "low" tier — enough rows + iterations to expose any workload
          # where UltraSQL has lost its lead, without spending the
          # 30-minute "ultra" budget.
          benchmarks/run.sh low postgres17,duckdb,sqlite3

      - name: upload raw bench results
        uses: actions/upload-artifact@v4
        with:
          name: supremacy-raw-results
          path: benchmarks/results/latest/raw/
          if-no-files-found: error
          retention-days: 30

      # -- Validate supremacy --------------------------------------------
      - name: check that ultrasql wins every workload
        run: python3 benchmarks/scripts/check_supremacy.py
