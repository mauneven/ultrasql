name: coverage

on:
  pull_request:
    paths:
      - 'crates/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/coverage_gate.py'
      - '.github/workflows/coverage.yml'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Cinstrument-coverage"
  LLVM_PROFILE_FILE: "target/llvm-cov-%p-%m.profraw"

jobs:
  llvm-cov:
    name: llvm-cov workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: run workspace coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features \
            --json --output-path target/llvm-cov/coverage.json \
            --fail-under-lines 80
          python3 scripts/coverage_gate.py \
            target/llvm-cov/coverage.json \
            --root "$GITHUB_WORKSPACE" \
            --min-lines 80
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info
      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: llvm-cov-lcov
          path: |
            target/llvm-cov/lcov.info
            target/llvm-cov/coverage.json
          if-no-files-found: warn
