name: bench

# Runs the criterion benchmark suite and compares against the recorded
# baseline. Triggered on PRs that touch performance-sensitive paths and
# nightly to maintain the baseline.

on:
  pull_request:
    paths:
      - 'crates/ultrasql-storage/**'
      - 'crates/ultrasql-wal/**'
      - 'crates/ultrasql-executor/**'
      - 'crates/ultrasql-vec/**'
      - 'crates/ultrasql-mvcc/**'
      - 'crates/ultrasql-txn/**'
      - 'benchmarks/**'
      - '.github/workflows/bench.yml'
  schedule:
    - cron: '0 6 * * *'        # 06:00 UTC daily — refresh trend data
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # -------------------------------------------------------------------
  # Microbenchmarks via criterion. Each affected crate runs its own
  # bench and uploads results as build artifacts. A follow-up step
  # diffs against the committed baseline.
  # -------------------------------------------------------------------
  micro:
    name: criterion (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: pre-warm benches
        run: cargo bench --workspace --no-run
      - name: run benches
        # Keep noise floor low: pin to a single thread per bench.
        env:
          RAYON_NUM_THREADS: 1
        run: |
          mkdir -p bench-out
          cargo bench --workspace -- --save-baseline pr 2>&1 | tee bench-out/run.log
      - name: upload criterion artifacts
        env:
          OS_LABEL: ${{ matrix.os }}
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ matrix.os }}
          path: |
            target/criterion
            bench-out

  # -------------------------------------------------------------------
  # OLTP / OLAP macro-benchmarks against committed datasets.
  # -------------------------------------------------------------------
  macro:
    name: macrobench (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace --features ultrasql-bench/sql-bench
      - name: TPC-B 1x sanity run
        env:
          OS_LABEL: ${{ matrix.os }}
        run: |
          mkdir -p bench-out
          ./target/release/ultrasql-bench tpcb --scale 1 --accounts 1000 \
              --duration 5 --warmup 1 --connections 8 \
              --output "bench-out/tpcb-${OS_LABEL}.json"
      - name: upload macro artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macrobench-${{ matrix.os }}
          path: bench-out/
