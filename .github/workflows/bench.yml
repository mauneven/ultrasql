name: bench

# PRs run short benchmark smoke only. Nightly/manual runs attempt longer
# certification suites and criterion sweeps. Missing external datasets or
# DSNs are recorded as unavailable artifacts, not benchmark claims.

on:
  pull_request:
    paths:
      - 'crates/ultrasql-storage/**'
      - 'crates/ultrasql-wal/**'
      - 'crates/ultrasql-executor/**'
      - 'crates/ultrasql-vec/**'
      - 'crates/ultrasql-mvcc/**'
      - 'crates/ultrasql-txn/**'
      - 'benchmarks/**'
      - '.github/workflows/bench.yml'
  schedule:
    - cron: '0 6 * * *'        # 06:00 UTC daily — refresh trend data
  workflow_dispatch:

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # -------------------------------------------------------------------
  # PR-safe benchmark smoke: no external benchmark assets, tiny inputs.
  # -------------------------------------------------------------------
  smoke:
    name: benchmark smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run smoke certifications
        run: benchmarks/certify.sh smoke
      - name: upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-smoke
          path: |
            benchmarks/results/latest/benchmark_certification_manifest.json
            benchmarks/results/latest/ai_benchmark_gauntlet_manifest.json
            benchmarks/results/latest/sysbench_certification.json
            benchmarks/results/latest/raw/*ai_gauntlet*
            benchmarks/results/latest/raw/*sysbench*
            benchmarks/results/latest/raw/*vector_ann*

  # -------------------------------------------------------------------
  # Full microbenchmarks via criterion. Scheduled/manual only because
  # criterion consumes enough time/noise budget to be poor PR feedback.
  # -------------------------------------------------------------------
  micro:
    name: criterion full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: pre-warm benches
        run: cargo bench --workspace --no-run
      - name: run benches
        # Keep noise floor low: pin to a single thread per bench.
        env:
          RAYON_NUM_THREADS: 1
        run: |
          mkdir -p bench-out
          cargo bench --workspace -- --save-baseline pr 2>&1 | tee bench-out/run.log
      - name: upload criterion artifacts
        env:
          OS_LABEL: ${{ matrix.os }}
        uses: actions/upload-artifact@v7
        with:
          name: criterion-${{ matrix.os }}
          path: |
            target/criterion
            bench-out

  # -------------------------------------------------------------------
  # Full macro/certification sweep. Attempts TPC-H, ClickBench, TPC-B,
  # TPC-C, Sysbench-style OLTP, and vector search. Setup-missing suites
  # write unavailable artifacts and do not claim numbers.
  # -------------------------------------------------------------------
  certifications:
    name: benchmark certifications
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run full certification matrix
        run: benchmarks/certify.sh full
      - name: upload certification artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-certifications
          path: |
            benchmarks/results/latest/*certification.json
            benchmarks/results/latest/ai_benchmark_gauntlet_manifest.json
            benchmarks/results/latest/benchmark_certification_manifest.json
            benchmarks/results/latest/raw/

  # -------------------------------------------------------------------
  # Current-commit scale sweep. This proves the checked-out ultrasqld can be
  # launched over TCP and benchmarked against local installed engines. It is
  # not a PR gate because package-manager setup and full DB-vs-DB sweeps are
  # noisy on shared runners.
  # -------------------------------------------------------------------
  current-commit-sweep:
    name: current commit scale sweep
    runs-on: macos-14
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install local comparison engines
        shell: bash
        run: |
          brew update
          brew install duckdb sqlite postgresql@14 clickhouse
          python3 -m venv "$RUNNER_TEMP/clickhouse-driver-venv"
          "$RUNNER_TEMP/clickhouse-driver-venv/bin/python" -m pip install --disable-pip-version-check clickhouse-driver duckdb
          echo "$RUNNER_TEMP/clickhouse-driver-venv/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix postgresql@14)/bin" >> "$GITHUB_PATH"
      - name: build current ultrasqld
        shell: bash
        run: cargo build --profile release-ship --package ultrasql-server --bin ultrasqld
      - name: start PostgreSQL
        shell: bash
        run: |
          pg_bin="$(brew --prefix postgresql@14)/bin"
          data="$RUNNER_TEMP/ultrasql-postgres"
          "$pg_bin/initdb" -D "$data" --username runner >/dev/null
          "$pg_bin/pg_ctl" -D "$data" -o "-h 127.0.0.1 -p 55432" -w start
          createdb -h 127.0.0.1 -p 55432 -U runner ultrasql_bench
      - name: run current commit scale sweep
        shell: bash
        env:
          PGHOST: 127.0.0.1
          PGPORT: 55432
          PGUSER: runner
          PGDATABASE: ultrasql_bench
          SCALE_SWEEP_ROWS: "10000 100000"
        run: |
          ULTRASQLD_BIN="target/release-ship/ultrasqld" CH_BIN="$(command -v clickhouse)" benchmarks/run_scale_sweep.sh quick
      - name: upload scale sweep artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: current-commit-scale-sweep
          path: benchmarks/results/latest/scale-sweep/
