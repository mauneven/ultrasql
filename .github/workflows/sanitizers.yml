name: sanitizers

# Nightly run of the test suite under sanitizers. AddressSanitizer and
# ThreadSanitizer require nightly Rust and the standard-library sources;
# Miri runs separately and covers UB beyond what the dynamic sanitizers
# find. These jobs are slow (~30 minutes) and so run on a schedule, not
# per PR.

on:
  schedule:
    - cron: '0 4 * * *'        # 04:00 UTC daily
  workflow_dispatch:

concurrency:
  group: sanitizers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CARGO_INCREMENTAL: 0

jobs:
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address -Cdebug-assertions=on"
      RUSTDOCFLAGS: "-Zsanitizer=address"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly test --workspace -Zbuild-std --target x86_64-unknown-linux-gnu

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=thread -Cdebug-assertions=on"
      RUSTDOCFLAGS: "-Zsanitizer=thread"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly test --workspace -Zbuild-std --target x86_64-unknown-linux-gnu

  miri:
    name: Miri
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri,rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri setup
      - name: run miri on unsafe-heavy crates
        run: |
          for crate in ultrasql-core ultrasql-storage ultrasql-parser; do
            cargo +nightly miri test -p "$crate"
          done
