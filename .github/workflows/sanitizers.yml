name: sanitizers

# Nightly run of the test suite under sanitizers. AddressSanitizer and
# ThreadSanitizer require nightly Rust and the standard-library sources;
# Miri runs separately and covers UB beyond what the dynamic sanitizers
# find. These jobs are slow (~30 minutes) and so run on a schedule, not
# per PR.

on:
  schedule:
    - cron: '0 4 * * *'        # 04:00 UTC daily
  workflow_dispatch:

concurrency:
  group: sanitizers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CARGO_INCREMENTAL: 0

jobs:
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address -Cdebug-assertions=on"
      RUSTDOCFLAGS: "-Zsanitizer=address"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly test --workspace -Zbuild-std --target x86_64-unknown-linux-gnu

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=thread -Cdebug-assertions=on"
      RUSTDOCFLAGS: "-Zsanitizer=thread"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo +nightly test \
            -p ultrasql-core \
            -p ultrasql-storage \
            -p ultrasql-parser \
            -p ultrasql-planner \
            -p ultrasql-executor \
            -p ultrasql-wal \
            -p ultrasql-mvcc \
            -p ultrasql-txn \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu

  miri:
    name: Miri
    runs-on: ubuntu-latest
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri,rust-src
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri setup
      - name: run miri smoke on memory-safety-sensitive crates
        run: |
          # Miri is an interpreter, so the CI gate runs targeted smoke tests
          # for unsafe-sensitive contracts. ASAN/TSAN above keep broad
          # workspace coverage for dynamic memory and threading bugs.
          cargo +nightly miri test -p ultrasql-core endian::tests::u64_round_trip
          cargo +nightly miri test -p ultrasql-core value::tests::display_round_trip_for_simple_values
          cargo +nightly miri test -p ultrasql-storage page::tests::page_round_trips_via_from_bytes
          cargo +nightly miri test -p ultrasql-storage page::tests::insert_and_read_round_trip
          cargo +nightly miri test -p ultrasql-storage buffer_pool::tests::read_after_write_sees_update
          cargo +nightly miri test -p ultrasql-parser parser::tests::deeply_nested_parens_rejected_without_overflow
