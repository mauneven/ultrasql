name: release

# Builds signed-by-checksum release artifacts for tagged versions.
# Tags must be `vX.Y.Z` and must match the workspace crate version.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      - name: verify tag matches workspace version
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              print(f"release tag must start with v: {tag}", file=sys.stderr)
              sys.exit(1)
          version = tag[1:]
          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          local_versions = {
              package["version"]
              for package in metadata["packages"]
              if package.get("source") is None
          }
          if local_versions != {version}:
              print(
                  "release tag/version mismatch: "
                  f"tag={tag}, local crate versions={sorted(local_versions)}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
      - run: python3 scripts/validate-release-workflow.py
      - run: cargo fmt --all -- --check
      - run: cargo audit --deny yanked
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features -- --nocapture
      - name: validate operator soak reports
        shell: bash
        run: |
          args=(
            --reports-dir operator-reports
            --min-reports 3
            --min-days 30
            --commit "$GITHUB_SHA"
            --out target/operator_soak_status.json
          )
          if [[ "$RELEASE_TAG" != v0.* ]]; then
            args+=(--strict)
          fi
          python3 scripts/validate-operator-soak.py "${args[@]}"

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar
            package_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar
            package_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar
            package_arch: ''
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar
            package_arch: ''
          - target: x86_64-pc-windows-msvc
            os: windows-2025
            archive: zip
            package_arch: ''
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build release binaries
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        if: matrix.archive == 'tar'
        run: |
          cargo build --locked --profile release-ship --target "$TARGET" \
            --bin ultrasqld \
            --bin ultrasql \
            --bin ultrasql-local
          cargo build --locked --profile release-ship --target "$TARGET" \
            -p ultrasql-node
          "target/${TARGET}/release-ship/ultrasqld" --version
          "target/${TARGET}/release-ship/ultrasql" --version
          "target/${TARGET}/release-ship/ultrasql-local" --help >/dev/null
      - name: build release binaries
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          cargo build --locked --profile release-ship --target $env:TARGET `
            --bin ultrasqld `
            --bin ultrasql `
            --bin ultrasql-local
          cargo build --locked --profile release-ship --target $env:TARGET `
            -p ultrasql-node
          & "target/$env:TARGET/release-ship/ultrasqld.exe" --version
          & "target/$env:TARGET/release-ship/ultrasql.exe" --version
          & "target/$env:TARGET/release-ship/ultrasql-local.exe" --help | Out-Null
      - name: package tarball
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        if: matrix.archive == 'tar'
        run: |
          name="ultrasql-${RELEASE_TAG}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release-ship/ultrasqld" "dist/${name}/"
          cp "target/${TARGET}/release-ship/ultrasql" "dist/${name}/"
          cp "target/${TARGET}/release-ship/ultrasql-local" "dist/${name}/"
          case "$TARGET" in
            *apple-darwin) cp "target/${TARGET}/release-ship/libultrasql_node.dylib" "dist/${name}/ultrasql.node" ;;
            *linux-gnu) cp "target/${TARGET}/release-ship/libultrasql_node.so" "dist/${name}/ultrasql.node" ;;
            *) echo "unsupported native addon target: $TARGET" >&2; exit 1 ;;
          esac
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - name: prepare linux package root
        env:
          TARGET: ${{ matrix.target }}
          PKG_ARCH: ${{ matrix.package_arch }}
        shell: bash
        if: matrix.package_arch != ''
        run: |
          version="${RELEASE_TAG#v}"
          name="ultrasql-${RELEASE_TAG}-${TARGET}"
          root="$PWD/target/package/${name}"
          config="$PWD/target/package/${name}.nfpm.yaml"
          install -d -m 0755 "$root/usr/bin"
          install -m 0755 "target/${TARGET}/release-ship/ultrasqld" "$root/usr/bin/ultrasqld"
          install -m 0755 "target/${TARGET}/release-ship/ultrasql" "$root/usr/bin/ultrasql"
          install -m 0755 "target/${TARGET}/release-ship/ultrasql-local" "$root/usr/bin/ultrasql-local"
          scripts/render-nfpm-config.sh "$version" "$PKG_ARCH" "$root" "$config"
      - uses: actions/setup-go@v6
        if: matrix.package_arch != ''
        with:
          go-version: "1.25"
          cache: false
      - name: install nfpm
        if: matrix.package_arch != ''
        shell: bash
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1
      - name: package deb
        if: matrix.package_arch != ''
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PKG_ARCH: ${{ matrix.package_arch }}
        run: |
          "$(go env GOPATH)/bin/nfpm" package \
            --packager deb \
            --config "target/package/ultrasql-${RELEASE_TAG}-${TARGET}.nfpm.yaml" \
            --target "dist/ultrasql-${RELEASE_TAG}-${TARGET}.${PKG_ARCH}.deb"
      - name: package rpm
        if: matrix.package_arch != ''
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PKG_ARCH: ${{ matrix.package_arch }}
        run: |
          "$(go env GOPATH)/bin/nfpm" package \
            --packager rpm \
            --config "target/package/ultrasql-${RELEASE_TAG}-${TARGET}.nfpm.yaml" \
            --target "dist/ultrasql-${RELEASE_TAG}-${TARGET}.${PKG_ARCH}.rpm"
      - name: package zip
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          $name = "ultrasql-$env:RELEASE_TAG-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/$env:TARGET/release-ship/ultrasqld.exe" "dist/$name/"
          Copy-Item "target/$env:TARGET/release-ship/ultrasql.exe" "dist/$name/"
          Copy-Item "target/$env:TARGET/release-ship/ultrasql-local.exe" "dist/$name/"
          Copy-Item "target/$env:TARGET/release-ship/ultrasql_node.dll" "dist/$name/ultrasql.node"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLowerInvariant()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
      - name: install nsis
        shell: pwsh
        if: matrix.archive == 'zip'
        run: choco install nsis -y --no-progress
      - name: package windows setup exe
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          $name = "ultrasql-$env:RELEASE_TAG-$env:TARGET"
          $version = $env:RELEASE_TAG
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          $source = (Resolve-Path "dist/$name").Path
          $out = Join-Path (Resolve-Path "dist").Path "$name-setup.exe"
          $license = (Resolve-Path "LICENSE-MIT").Path
          $nsi = "target/package/$name.nsi"
          New-Item -ItemType Directory -Force -Path (Split-Path $nsi) | Out-Null
          $template = Get-Content "packaging/windows/ultrasql.nsi.in" -Raw
          $template = $template.Replace("@VERSION@", $version)
          $template = $template.Replace("@SOURCE_DIR@", $source)
          $template = $template.Replace("@OUT_FILE@", $out)
          $template = $template.Replace("@LICENSE_FILE@", $license)
          Set-Content -Path $nsi -Value $template -Encoding ascii
          $makensis = Join-Path ${env:ProgramFiles(x86)} "NSIS\makensis.exe"
          & $makensis $nsi
          $setup = "$name-setup.exe"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$setup").Hash.ToLowerInvariant()
          "$hash  $setup" | Out-File -Encoding ascii "dist/$setup.sha256"
      - name: package chocolatey nupkg
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          $name = "ultrasql-$env:RELEASE_TAG-$env:TARGET"
          $version = $env:RELEASE_TAG
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          $setup = "$name-setup.exe"
          $setupSha = (Get-Content "dist/$setup.sha256").Split(" ")[0]
          $pkgDir = "target/chocolatey"
          New-Item -ItemType Directory -Force -Path "$pkgDir/tools" | Out-Null
          $nuspec = Get-Content "packaging/chocolatey/ultrasql.nuspec.in" -Raw
          $nuspec = $nuspec.Replace("@VERSION@", $version)
          Set-Content -Path "$pkgDir/ultrasql.nuspec" -Value $nuspec -Encoding utf8
          $install = Get-Content "packaging/chocolatey/tools/chocolateyInstall.ps1.in" -Raw
          $install = $install.Replace("@VERSION@", $version)
          $install = $install.Replace("@TAG@", $env:RELEASE_TAG)
          $install = $install.Replace("@SETUP_SHA256@", $setupSha)
          Set-Content -Path "$pkgDir/tools/chocolateyInstall.ps1" -Value $install -Encoding utf8
          Copy-Item "packaging/chocolatey/tools/chocolateyUninstall.ps1.in" "$pkgDir/tools/chocolateyUninstall.ps1"
          choco pack "$pkgDir/ultrasql.nuspec" --outputdirectory "dist"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $nupkg = "ultrasql.$version.nupkg"
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$nupkg").Hash.ToLowerInvariant()
          "$hash  $nupkg" | Out-File -Encoding ascii "dist/$nupkg.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip.sha256
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}-setup.exe
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}-setup.exe.sha256
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.deb
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.rpm
            dist/ultrasql.*.nupkg
            dist/ultrasql.*.nupkg.sha256
          if-no-files-found: ignore

  docker:
    name: publish docker image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: ghcr.io/${{ github.repository_owner }}/ultrasql:${{ env.RELEASE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - uses: actions/download-artifact@v8
        with:
          pattern: ultrasql-${{ env.RELEASE_TAG }}-*
          path: dist
      - name: flatten assets and generate checksum manifest
        shell: bash
        run: |
          mkdir -p release
          version="${RELEASE_TAG#v}"
          git archive --format=tar.gz --prefix="ultrasql-${version}/" -o "release/ultrasql-v${version}-source.tar.gz" HEAD
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.exe' -o -name '*.deb' -o -name '*.rpm' -o -name '*.nupkg' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          npm pack ./packages/npm --pack-destination release
          (
            cd release
            for asset in *.tar.gz *.tgz *.zip *.exe *.deb *.rpm *.nupkg; do
              [ -e "$asset" ] || continue
              shasum -a 256 "$asset"
            done > SHASUMS256.txt
          )
          scripts/render-homebrew-formula.sh "$RELEASE_TAG" release/SHASUMS256.txt release/ultrasql.rb
          scripts/render-aur-package.sh "$RELEASE_TAG" release/SHASUMS256.txt release
          (
            cd release
            for asset in ultrasql.rb "ultrasql-aur-${RELEASE_TAG}.tar.gz"; do
              shasum -a 256 "$asset" >> SHASUMS256.txt
              shasum -a 256 "$asset" > "$asset.sha256"
            done
          )
          args=(
            --reports-dir operator-reports
            --min-reports 3
            --min-days 30
            --commit "$GITHUB_SHA"
            --out release/operator_soak_status.json
          )
          if [[ "$RELEASE_TAG" != v0.* ]]; then
            args+=(--strict)
          fi
          python3 scripts/validate-operator-soak.py "${args[@]}"
          scripts/render-release-notes.sh "$RELEASE_TAG" release/operator_soak_status.json release/RELEASE_NOTES.md
          ls -la release
      - name: publish github release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release/RELEASE_NOTES.md
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ startsWith(env.RELEASE_TAG, 'v0.') }}

  npm:
    name: publish npm package
    runs-on: ubuntu-latest
    needs: publish
    environment: main
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: show npm trusted publishing toolchain
        run: |
          node --version
          npm --version
      - name: verify npm package version matches release tag
        shell: bash
        run: |
          node - <<'JS'
          const pkg = require("./packages/npm/package.json");
          const tag = process.env.RELEASE_TAG;
          const version = tag.startsWith("v") ? tag.slice(1) : tag;
          if (pkg.version !== version) {
            throw new Error(`npm package version ${pkg.version} does not match ${tag}`);
          }
          JS
      - run: node --test packages/npm/test/*.test.js
      - name: publish npm package
        working-directory: packages/npm
        run: |
          npm publish --access public

  chocolatey:
    name: publish chocolatey package
    runs-on: windows-2025
    needs: publish
    permissions:
      contents: read
    steps:
      - name: publish chocolatey package
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            Write-Output "::warning::CHOCOLATEY_API_KEY missing; Chocolatey publish skipped"
            exit 0
          }
          New-Item -ItemType Directory -Force -Path release | Out-Null
          gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --pattern "ultrasql.*.nupkg" --dir release
          choco apikey --key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/
          $package = Get-ChildItem release -Filter "*.nupkg" | Select-Object -First 1
          if ($null -eq $package) { throw "Chocolatey package asset missing" }
          choco push $package.FullName --source https://push.chocolatey.org/

  aur:
    name: publish AUR package
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - name: publish AUR package
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "::warning::AUR_SSH_PRIVATE_KEY missing; AUR publish skipped"
            exit 0
          fi
          mkdir -p ~/.ssh release aur-package
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "ultrasql-aur-${RELEASE_TAG}.tar.gz" --dir release
          tar -C aur-package -xzf "release/ultrasql-aur-${RELEASE_TAG}.tar.gz"
          git clone aur@aur.archlinux.org:ultrasql-bin.git aur || {
            git init aur
            git -C aur checkout -b master
            git -C aur remote add origin aur@aur.archlinux.org:ultrasql-bin.git
          }
          cp aur-package/PKGBUILD aur-package/.SRCINFO aur/
          git -C aur config user.name "github-actions[bot]"
          git -C aur config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C aur add PKGBUILD .SRCINFO
          if git -C aur diff --cached --quiet; then
            echo "AUR package already current"
            exit 0
          fi
          git -C aur commit -m "update ultrasql ${RELEASE_TAG}"
          git -C aur push origin master

  homebrew:
    name: publish homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - name: publish homebrew tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN missing; Homebrew tap publish skipped"
            exit 0
          fi
          tap_repo="${HOMEBREW_TAP_REPOSITORY:-mauneven/homebrew-tap}"
          mkdir -p release
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "ultrasql.rb" --dir release
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${tap_repo}.git" tap
          mkdir -p tap/Formula
          cp release/ultrasql.rb tap/Formula/ultrasql.rb
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/ultrasql.rb
          if git -C tap diff --cached --quiet; then
            echo "Homebrew tap already current"
            exit 0
          fi
          git -C tap commit -m "update ultrasql ${RELEASE_TAG}"
          git -C tap push origin HEAD
