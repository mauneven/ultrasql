name: release

# Builds release artifacts for tagged versions and uploads them as
# GitHub Release assets. Triggered by tags of the form `vX.Y.Z`.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build release binaries
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET" --bin ultrasqld --bin ultrasql
      - name: stage artifacts
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/ultrasqld" dist/
          cp "target/${TARGET}/release/ultrasql"  dist/
          (cd dist && tar -czf "ultrasql-${TAG}-${TARGET}.tar.gz" ultrasqld ultrasql)
      - uses: actions/upload-artifact@v4
        with:
          name: ultrasql-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/ultrasql-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/**/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
