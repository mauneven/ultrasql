name: release

# Builds signed-by-checksum release artifacts for tagged versions.
# Tags must be `vX.Y.Z` and must match the workspace crate version.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  verify:
    name: release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      - name: verify tag matches workspace version
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              print(f"release tag must start with v: {tag}", file=sys.stderr)
              sys.exit(1)
          version = tag[1:]
          metadata = json.loads(
              subprocess.check_output(
                  ["cargo", "metadata", "--no-deps", "--format-version", "1"],
                  text=True,
              )
          )
          local_versions = {
              package["version"]
              for package in metadata["packages"]
              if package.get("source") is None
          }
          if local_versions != {version}:
              print(
                  "release tag/version mismatch: "
                  f"tag={tag}, local crate versions={sorted(local_versions)}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
      - run: cargo fmt --all -- --check
      - run: cargo audit --deny yanked
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features -- --nocapture
      - name: validate operator soak reports
        run: |
          python3 scripts/validate-operator-soak.py \
            --reports-dir operator-reports \
            --min-reports 3 \
            --min-days 30 \
            --strict \
            --out target/operator_soak_status.json

  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar
            package_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar
            package_arch: arm64
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar
            package_arch: ''
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar
            package_arch: ''
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            package_arch: ''
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build release binaries
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        if: matrix.archive == 'tar'
        run: |
          cargo build --locked --profile release-ship --target "$TARGET" \
            --bin ultrasqld \
            --bin ultrasql \
            --bin ultrasql-local
          "target/${TARGET}/release-ship/ultrasqld" --version
          "target/${TARGET}/release-ship/ultrasql" --version
          "target/${TARGET}/release-ship/ultrasql-local" --help >/dev/null
      - name: build release binaries
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          cargo build --locked --profile release-ship --target $env:TARGET `
            --bin ultrasqld `
            --bin ultrasql `
            --bin ultrasql-local
          & "target/$env:TARGET/release-ship/ultrasqld.exe" --version
          & "target/$env:TARGET/release-ship/ultrasql.exe" --version
          & "target/$env:TARGET/release-ship/ultrasql-local.exe" --help | Out-Null
      - name: package tarball
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        if: matrix.archive == 'tar'
        run: |
          name="ultrasql-${RELEASE_TAG}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release-ship/ultrasqld" "dist/${name}/"
          cp "target/${TARGET}/release-ship/ultrasql" "dist/${name}/"
          cp "target/${TARGET}/release-ship/ultrasql-local" "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
      - name: prepare linux package root
        env:
          TARGET: ${{ matrix.target }}
          PKG_ARCH: ${{ matrix.package_arch }}
        shell: bash
        if: matrix.package_arch != ''
        run: |
          version="${RELEASE_TAG#v}"
          name="ultrasql-${RELEASE_TAG}-${TARGET}"
          root="$PWD/target/package/${name}"
          config="$PWD/target/package/${name}.nfpm.yaml"
          install -d -m 0755 "$root/usr/bin"
          install -m 0755 "target/${TARGET}/release-ship/ultrasqld" "$root/usr/bin/ultrasqld"
          install -m 0755 "target/${TARGET}/release-ship/ultrasql" "$root/usr/bin/ultrasql"
          install -m 0755 "target/${TARGET}/release-ship/ultrasql-local" "$root/usr/bin/ultrasql-local"
          scripts/render-nfpm-config.sh "$version" "$PKG_ARCH" "$root" "$config"
      - name: package deb
        if: matrix.package_arch != ''
        uses: goreleaser/nfpm-action@v2
        with:
          version: v2.43.1
          args: package --packager deb --config target/package/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.nfpm.yaml --target dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.deb
      - name: package rpm
        if: matrix.package_arch != ''
        uses: goreleaser/nfpm-action@v2
        with:
          version: v2.43.1
          args: package --packager rpm --config target/package/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.nfpm.yaml --target dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.rpm
      - name: package zip
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        if: matrix.archive == 'zip'
        run: |
          $name = "ultrasql-$env:RELEASE_TAG-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/$env:TARGET/release-ship/ultrasqld.exe" "dist/$name/"
          Copy-Item "target/$env:TARGET/release-ship/ultrasql.exe" "dist/$name/"
          Copy-Item "target/$env:TARGET/release-ship/ultrasql-local.exe" "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/$name.zip").Hash.ToLowerInvariant()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}
          path: |
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz.sha256
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip.sha256
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.deb
            dist/ultrasql-${{ env.RELEASE_TAG }}-${{ matrix.target }}.${{ matrix.package_arch }}.rpm
          if-no-files-found: ignore

  docker:
    name: publish docker image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ultrasql:${{ env.RELEASE_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: flatten assets and generate checksum manifest
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          (
            cd release
            for asset in *.tar.gz *.zip *.deb *.rpm; do
              [ -e "$asset" ] || continue
              shasum -a 256 "$asset"
            done > SHASUMS256.txt
          )
          scripts/render-homebrew-formula.sh "$RELEASE_TAG" release/SHASUMS256.txt release/ultrasql.rb
          python3 scripts/validate-operator-soak.py \
            --reports-dir operator-reports \
            --min-reports 3 \
            --min-days 30 \
            --strict \
            --out release/operator_soak_status.json
          scripts/render-release-notes.sh "$RELEASE_TAG" release/operator_soak_status.json release/RELEASE_NOTES.md
          ls -la release
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release/RELEASE_NOTES.md
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ startsWith(env.RELEASE_TAG, 'v0.') }}
