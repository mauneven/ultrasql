edition          = "2024"
max_width        = 100
hard_tabs        = false
tab_spaces       = 4
newline_style    = "Unix"
use_small_heuristics = "Default"
reorder_imports  = true
reorder_modules  = true
fn_params_layout = "Tall"
match_block_trailing_comma = false

# Nightly-only knobs (imports_granularity, group_imports,
# wrap_comments, format_code_in_doc_comments, comment_width,
# normalize_comments) are intentionally omitted so `cargo fmt` on
# stable does not warn. Re-introduce them in a nightly-rustfmt
# job once we adopt one.
