host:
  hostname: ultrasql-m4-mini
  cpu_model: "Apple M4"
  cpu_cores: 10
  cpu_threads: 10
  cpu_freq_ghz: 4.4
  ram_gb: 16
  storage:
    type: NVMe
    model: "Apple Fabric NVMe SSD (internal)"
    size_gb: 512
  os:
    kernel: "Darwin 25.5.0"
    name: "macOS"
    version: "26.5"
  rust:
    channel: stable
    version: "1.95.0"
    target: aarch64-apple-darwin
  ultrasql:
    profile: release (opt-level=3, lto=fat, codegen-units=1)
    cargo_features: []
    target_cpu: apple-m1   # Apple M4 still consumes the apple-m1 LLVM tuning
  power:
    plugged_in: true
    thermal_state: nominal

scope:
  category: cross-engine concurrency comparison
  workloads:
    - "conc-read-sum: SELECT SUM(x) FROM t — 1,000,000 i64 rows, T concurrent clients, 5 s window"
    - "conc-read-point: SELECT x FROM t WHERE id = ? — 1,000,000-row PK-indexed, T concurrent clients, 5 s window"
    - "conc-insert: INSERT (id, val) — disjoint id ranges per thread, T concurrent clients, 5 s window"
    - "conc-update: UPDATE 10,000-row slice per thread — T concurrent clients, 5 s window"
  thread_counts: [1, 2, 4, 8, 16, 32]
  measure_secs: 5
  warmup_secs: 1
  repeats: 3
  notes: |
    Per-cell budget: 1 s warmup + 5 s measured × 3 repeats. Median
    ops/s reported. Total wall-clock budget ≤ 30 minutes.

    UltraSQL row is kernel/heap-level (no parser/planner/executor at
    v0.5); other engines run the full SQL pipeline. ClickHouse is
    marked skipped on every cell because OLTP-flavoured concurrency
    is outside its design point.

    PostgreSQL is bounded by its `max_connections` setting (default
    100 on Homebrew PG14). Cells where `T + 5 > max_connections` are
    recorded as skipped explicitly.

    SQLite serialises writes; we keep the INSERT/UPDATE numbers as
    "max sustained write rate the single writer achieves under T
    contending clients" and document the serialisation behaviour.

    DuckDB does not support multi-writer to a single Database; the
    write cells run T independent in-memory DuckDB databases (one
    per thread), with the load cost amortised inside the measured
    window. The read cells share one DuckDB Database object.

engines_measured:
  - name: UltraSQL (kernel)
    version: 0.0.1
    method: cross_concurrency binary — std::thread fan-out against kernel/heap APIs
    samples: 3 per cell (median ops/s)
    binary: target/release/cross_concurrency
  - name: PostgreSQL
    version: "14.x (Homebrew)"
    method: pgbench -c T -j T -T 5 -f custom-script.sql
    samples: 3 per cell (median tps)
    transport: TCP localhost
    settings:
      max_parallel_workers_per_gather: 0
      max_connections: "100 (Homebrew default); cells > 95 skipped"
  - name: SQLite
    version: "3.51.x"
    method: Python threading + sqlite3 module with file::memory:?cache=shared
    samples: 3 per cell
    db: "file::memory:?cache=shared (URI)"
    writes_serialise: true
  - name: DuckDB
    version: "1.5.x"
    method: Python threading + duckdb Python binding
    samples: 3 per cell
    db: shared :memory: for reads; private :memory: per thread for writes
  - name: ClickHouse
    version: "26.5.x"
    method: skipped (OLTP-flavoured concurrency outside design point)
    samples: 0
    skip_reason: "OLAP-focused engine"

datasets:
  data_x_1m.csv:   "1,000,000 i64 single-column, seed 0xDEADBEEF (first 1M of the extended-comparison stream)"
  data_id_1m.csv:  "1,000,000 (id i64 PK, x i64) two-column; id is a permutation of 0..1_000_000 (seed 0xC0FFEE)"
