host:
  hostname: ultrasql-m4-mini
  cpu_model: "Apple M4"
  cpu_cores: 10
  cpu_threads: 10
  cpu_freq_ghz: 4.4
  ram_gb: 16
  storage:
    type: NVMe
    model: "Apple Fabric NVMe SSD (internal)"
    size_gb: 512
  os:
    kernel: "Darwin 25.5.0"
    name: "macOS"
    version: "26.5"
  rust:
    channel: stable
    version: "1.95.0"
    target: aarch64-apple-darwin
  ultrasql:
    # Filled at run time by the orchestrator; equal to the parent
    # comparison's commit unless cross_compare was modified.
    commit: see ../comparison-2026-05-12-m4-extended/host.yaml
    profile: release (opt-level=3, lto=fat, codegen-units=1)
    cargo_features: []
    target_cpu: apple-m1
  power:
    plugged_in: true
    thermal_state: nominal

scope:
  category: cross-engine comparison (fill-in)
  workloads:
    - "SELECT SUM(x) FROM t over 256,000 i64 rows"
    - "SELECT SUM(x) FROM t over 4,000,000 i64 rows"
    - "SELECT COUNT(*) FROM t over 1,000,000 i64 rows"
    - "SELECT AVG(x) FROM t over 1,000,000 i64 rows"
  notes: |
    Fill-in measurements to round out the README headline set.
    Identical methodology to ../comparison-2026-05-12-m4-extended/.

engines_measured:
  - name: UltraSQL (kernel)
    version: 0.0.1
    method: cross_compare driver — vec kernels measured in isolation
    samples: 8 per workload (median)
    binary: target/release/cross_compare
  - name: DuckDB
    version: "1.5.2 (Variegata) 8a5851971f"
    method: PRAGMA enable_profiling=json (latency)
    samples: 8 per workload
    threads: 1 (PRAGMA threads=1)
  - name: SQLite
    version: "3.51.0 2025-06-12"
    method: .timer on (user time, microsecond resolution)
    samples: 8 per workload
    db: ":memory:"
  - name: PostgreSQL
    version: "14.22 (Homebrew)"
    method: psql \timing (millisecond + 3 decimal digit precision)
    samples: 8 per workload
    transport: Unix socket
    settings: "max_parallel_workers_per_gather = 0"
  - name: ClickHouse
    version: "26.5.1.587 (official build)"
    method: clickhouse local --format=JSON statistics.elapsed
    samples: 8 per workload
    engine: Memory

datasets:
  data_x_256k.csv: "256,000   i64 single-column (header `x`), seed 0xDEADBEEF (prefix of x_4m)"
  data_x_1m.csv:   "1,000,000 i64 single-column (header `x`), seed 0xDEADBEEF (prefix of x_4m)"
  data_x_4m.csv:   "4,000,000 i64 single-column (header `x`), seed 0xDEADBEEF"
