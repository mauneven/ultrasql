host:
  hostname: ultrasql-m4-mini
  cpu_model: "Apple M4"
  cpu_cores: 10
  cpu_threads: 10
  cpu_freq_ghz: 4.4
  ram_gb: 16
  storage:
    type: NVMe
    model: "Apple Fabric NVMe SSD (internal)"
    size_gb: 512
  os:
    kernel: "Darwin 25.5.0"
    name: "macOS"
    version: "26.5"
  rust:
    channel: stable
    version: "1.95.0"
    target: aarch64-apple-darwin
  ultrasql:
    commit: 373bb69e3264bca51ed0b1c57c8784109a815d90
    profile: bench (opt-level=3, lto=fat, codegen-units=1)
    cargo_features: []
    target_cpu: apple-m1   # Apple M4 still consumes the apple-m1 LLVM tuning
  power:
    plugged_in: true
    thermal_state: nominal

scope:
  category: cross-engine comparison
  workload: "SELECT SUM(x) FROM t over 65,536 i64 rows, hot cache"
  not_workload: false
  notes: |
    Cross-engine SUM(x) comparison measuring the median wall-clock time
    to execute SELECT SUM(x) FROM t against a single-column BIGINT table
    of 65,536 rows, after warm-up, in a hot-cache state. The UltraSQL
    line reports the existing vec/sum_i64@65536 microbenchmark from
    crates/ultrasql-vec/benches/kernels.rs because UltraSQL has no SQL
    surface yet (see ROADMAP.md, v0.5 "Execute"); treat it as a lower
    bound on the eventual end-to-end query. Every other engine measures
    its full SQL pipeline through its built-in timing facility.

engines_measured:
  - name: UltraSQL (kernel)
    version: 0.0.1
    method: criterion (vec/sum_i64/65536)
    samples: 100
  - name: DuckDB
    version: "1.5.2 (Variegata) 8a5851971f"
    method: PRAGMA enable_profiling=json (latency)
    samples: 8
  - name: SQLite
    version: "3.51.0 2025-06-12"
    method: .timer on (user time, microsecond resolution)
    samples: 8
  - name: PostgreSQL
    version: "14.22 (Homebrew)"
    method: psql \timing (millisecond + 3 decimal digit precision)
    samples: 8
    transport: Unix socket
  - name: ClickHouse
    version: "26.5.1.587 (official build)"
    method: clickhouse local --format=JSON statistics.elapsed
    samples: 8

engines_skipped:
  - name: MySQL
    reason: |
      Not installed. Installing mysql via brew and starting mysqld
      requires running a daemon; the methodology budget of 15 minutes
      total wall time and the "no sudo" constraint made the setup cost
      exceed the per-engine budget. Skip recorded; the methodology and
      results.json document the skip explicitly so a future contributor
      can fill the row.
