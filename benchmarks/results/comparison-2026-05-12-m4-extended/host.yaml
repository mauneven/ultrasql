host:
  hostname: ultrasql-m4-mini
  cpu_model: "Apple M4"
  cpu_cores: 10
  cpu_threads: 10
  cpu_freq_ghz: 4.4
  ram_gb: 16
  storage:
    type: NVMe
    model: "Apple Fabric NVMe SSD (internal)"
    size_gb: 512
  os:
    kernel: "Darwin 25.5.0"
    name: "macOS"
    version: "26.5"
  rust:
    channel: stable
    version: "1.95.0"
    target: aarch64-apple-darwin
  ultrasql:
    commit: 1da682edee9ec4a4ad5a4ed05c5dcf91ddf4fadf  # cross_compare driver commit
    profile: release (opt-level=3, lto=fat, codegen-units=1)
    cargo_features: []
    target_cpu: apple-m1   # Apple M4 still consumes the apple-m1 LLVM tuning
  power:
    plugged_in: true
    thermal_state: nominal

scope:
  category: cross-engine comparison (extended)
  workloads:
    - "SELECT SUM(x) FROM t over 1,000,000 i64 rows"
    - "SELECT SUM(x) FROM t over 10,000,000 i64 rows"
    - "SELECT COUNT(*) FROM t over 10,000,000 i64 rows"
    - "SELECT MIN(x), MAX(x) FROM t over 10,000,000 i64 rows"
    - "SELECT AVG(x) FROM t over 10,000,000 i64 rows"
    - "SELECT SUM(x) FROM t WHERE y > 0 over 10,000,000 (i64 x, i64 y) rows"
    - "SELECT COUNT(*) FROM t WHERE x BETWEEN -1e9 AND 1e9 over 10,000,000 i64 rows"
    - "SELECT x FROM t WHERE id = ? over 10,000,000-row indexed table (point lookup)"
    - "SELECT x FROM t ORDER BY x LIMIT 10 over 1,000,000 / 10,000,000 i64 rows"
  notes: |
    Extends the 2026-05-12 single-workload comparison to eight more
    workloads at larger dataset sizes. Same deterministic-seed CSV
    data is shared across engines; each engine's median is taken
    over 8 measured iterations after a per-engine warmup. UltraSQL
    rows are kernel-only measurements via crates/ultrasql-bench's
    cross_compare driver — there is no SQL surface end-to-end yet
    (see ROADMAP.md, v0.5). UltraSQL point-lookup is capped at 1M
    keys because the v0.5 buffer pool refuses to evict dirty pages;
    SQL engines use the full 10M-row indexed table. Top-K is marked
    skipped on UltraSQL because vec has no ORDER BY kernel yet.

engines_measured:
  - name: UltraSQL (kernel)
    version: 0.0.1
    method: cross_compare driver — vec kernels measured in isolation
    samples: 8 per workload (median)
    binary: target/release/cross_compare
  - name: DuckDB
    version: "1.5.2 (Variegata) 8a5851971f"
    method: PRAGMA enable_profiling=json (latency)
    samples: 8 per workload
    threads: 1 (PRAGMA threads=1)
  - name: SQLite
    version: "3.51.0 2025-06-12"
    method: .timer on (user time, microsecond resolution)
    samples: 8 per workload
    db: ":memory:"
  - name: PostgreSQL
    version: "14.22 (Homebrew)"
    method: psql \timing (millisecond + 3 decimal digit precision)
    samples: 8 per workload
    transport: Unix socket
    settings: "max_parallel_workers_per_gather = 0"
  - name: ClickHouse
    version: "26.5.1.587 (official build)"
    method: clickhouse local --format=JSON statistics.elapsed
    samples: 8 per workload
    engine: Memory

datasets:
  data_x_1m.csv:   "1,000,000  i64 single-column (header `x`),       seed 0xDEADBEEF"
  data_x_10m.csv:  "10,000,000 i64 single-column (header `x`),       seed 0xDEADBEEF"
  data_y_10m.csv:  "10,000,000 i64 single-column (header `y`),       seed 0xBADC0DE"
  data_xy_10m.csv: "10,000,000 i64 two-column (header `x,y`),        merged x/y above"
  data_id_10m.csv: "10,000,000 (id i64 PK, x i64) two-column,        id is a deterministic permutation of 0..N (seed 0xC0FFEE)"
