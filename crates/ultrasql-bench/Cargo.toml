[package]
name        = "ultrasql-bench"
description = "UltraSQL benchmark harness: TPC-B, TPC-C, TPC-H, micro-benchmarks."
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
authors.workspace      = true
repository.workspace   = true
publish = false
# Disable auto-discovery so a work-in-progress .rs file in src/bin/
# does not turn into a bin until it is explicitly registered below.
autobins = false

[lints]
workspace = true

[[bin]]
name = "ultrasql-bench"
path = "src/main.rs"

[[bin]]
name = "cross_compare"
path = "src/bin/cross_compare.rs"

[[bin]]
name = "cross_concurrency"
path = "src/bin/cross_concurrency.rs"

[dependencies]
ultrasql-core     = { workspace = true }
ultrasql-protocol = { workspace = true }
ultrasql-vec      = { workspace = true }
ultrasql-storage  = { workspace = true }
anyhow            = { workspace = true }
clap              = { workspace = true }
tokio             = { workspace = true }
tracing           = { workspace = true }
tracing-subscriber = { workspace = true }
