site_name: UltraSQL
site_url: https://docs.ultrasql.org/
site_description: Fast SQL database in Rust.
repo_name: mauneven/ultrasql
repo_url: https://github.com/mauneven/ultrasql
edit_uri: edit/main/docs/
docs_dir: docs
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Install: install.md
  - Packaging: packaging.md
  - Configuration: configuration.md
  - AI Database Strategy: ai-database-strategy.md
  - Backup and Restore: backup-restore.md
  - Chaos Recovery: chaos-recovery.md
  - Production Readiness Audit: production-readiness.md
  - Operator Reports: operator-reports.md
  - External Audits: external-audits.md
  - Incident Drills: incident-drills.md
  - Release Notes Template: release-notes-template.md
  - Driver Certification: driver-certification.md
  - Migration Guide: migration-guide.md
  - Known Limitations: known-limitations.md
  - Security and Ethics Audit: security-ethics-audit.md
  - Testing:
      - Coverage Evidence 2026-05-28: testing/coverage-evidence-2026-05-28.md
      - Coverage Evidence 2026-05-24: testing/coverage-evidence-2026-05-24.md
      - External SQL Test Reuse: testing/external-sql-test-reuse.md
      - Isolation Suite: testing/isolation-suite.md
